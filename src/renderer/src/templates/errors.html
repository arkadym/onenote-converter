<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Errors</title>
    <style>
        main {
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <main>
        <h1>Errors</h1>
        <p>The following pages failed to import:</p>
        <ul>
            {% for entry in errors -%}
                <li><strong>{{ entry.page_name }}</strong>{% if !entry.detail.is_empty() %} — <code>{{ entry.detail }}</code>{% endif %}</li>
            {% endfor %}
        </ul>
        <p>All other pages in this section were imported successfully.</p>
    </main>

<script>
    if (window.parent !== null) {
        window.parent.postMessage(window.location.href, '*');
    }
</script>
</body>
</html>
